<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração do Bot</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #16213e; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 350px; border: 1px solid #0f3460; }
        h2 { text-align: center; color: #e94560; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #95a5a6; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #0f3460; background: #0f3460; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #e94560; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #ff4d6d; }
        .warning { font-size: 0.75rem; color: #f1c40f; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dashboard Bot</h2>
    
    <div class="input-group">
        <label for="bot-token">Token do Bot (Privado)</label>
        <input type="password" id="bot-token" placeholder="Insira o token aqui...">
    </div>

    <div class="input-group">
        <label for="prefix">Prefixo do Comando</label>
        <input type="text" id="prefix" placeholder="Ex: ! ou /">
    </div>

    <div class="input-group">
        <label for="status">Status do Bot</label>
        <input type="text" id="status" placeholder="Ex: Jogando algo...">
    </div>

    <button onclick="saveConfig()">Salvar Configurações</button>

    <p class="warning">⚠️ Nunca compartilhe a URL deste site se o token estiver preenchido.</p>
</div>

<script>
    function saveConfig() {
        const config = {
            token: document.getElementById('bot-token').value,
            prefix: document.getElementById('prefix').value,
            status: document.getElementById('status').value
        };

        // Aqui você enviaria os dados para o seu banco de dados ou API
        console.log("Configurações salvas:", config);
        alert("Configurações enviadas! Verifique o console do navegador.");
    }
</script>

</body>
</html>
